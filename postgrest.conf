# URI de conexión a la base de datos
# Formato: postgres://usuario:contraseña@host:puerto/nombre_db
db-uri = "postgres://postgres:admin@localhost:5432/infoanav"

# El esquema que PostgREST expondrá
db-schemas = "api, auth"

# El rol que se usará para peticiones sin token JWT
db-anon-role = "anon"

# El secreto JWT para validar los tokens
# Debe tener al menos 32 caracteres para ser seguro
jwt-secret = "12345678123456781234567812345678"

# Opcional: Puerto en el que correrá el servidor de PostgREST
server-port = 3000

# Pasar configuraciones a la base de datos
db-config = true 


